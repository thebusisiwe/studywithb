<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study With B — Pomodoro Timer</title>
  <meta name="theme-color" content="#161111">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain" aria-hidden="true"></div>

    <main class="container">
      <section class="editorial-rail" aria-label="App framing">
      <div class="meta-row">
        <p class="kicker">Study With Intention</p>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme">Dark mode</button>
      </div>
        <h1 class="title">Pomodoro Timer</h1>
      <p class="subtitle">For creators who code in daylight and pray at midnight.</p>
        <p class="rail-note">Issue 01 · Ritual Edition</p>
      </section>

      <section class="timer-stage" aria-label="Timer controls">
        <div class="mode-selector" id="mode-selector" role="group" aria-label="Session mode"></div>
        <p class="timer-label" id="timer-label">Work</p>
        <p class="timer" id="timer">25:00</p>
        <p class="timer-status" id="timer-status">Ready to begin</p>
        <div class="task-block">
          <label class="task-label" for="task-input">Current task (optional)</label>
          <input class="task-input" id="task-input" type="text" maxlength="80" placeholder="What are you focusing on?" autocomplete="off">
        </div>
        <div class="completion-note" id="completion-note" aria-live="polite" hidden>
          <p class="completion-note-label">Session complete</p>
          <p class="completion-note-body" id="completion-note-body">Time's up.</p>
        </div>

        <div class="button-wrapper">
          <button id="start">Start</button>
          <button id="pause">Pause</button>
          <button id="reset">Reset</button>
        </div>

        <section class="history-panel" aria-label="Session history">
          <p class="history-title">Recent sessions</p>
          <p class="history-empty" id="history-empty">No sessions logged yet.</p>
          <ul class="history-list" id="history-list"></ul>
        </section>
      </section>
    </main>
  <!--JS-->
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {
          // SW registration failed silently; app still works online.
        });
      });
    }
  </script>
</body>
</html>
